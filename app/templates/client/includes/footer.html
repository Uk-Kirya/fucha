{% if request.path != '/login' %}
    <footer>
        <div>
            <div class="tabs">
                <a href="{{ url_for('home') }}" class="{% if request.url.path == '/home' %} active__tab {% endif %}">
                    <picture>
                        <img src="{{ url_for('static', path='client/img/home.svg') }}" alt="">
                    </picture>
                    Главная
                </a>
                <a href="{{ url_for('challenges') }}" class="{% if request.url.path == '/challenges' %} active__tab {% endif %}">
                    <picture>
                        <img src="{{ url_for('static', path='client/img/target.svg') }}" alt="">
                    </picture>
                    Челленджи
                </a>
            </div>
        </div>
        <a href="#" class="add__button">
            <picture>
                <img src="{{ url_for('static', path='client/img/plus.svg') }}" alt="">
            </picture>
        </a>
    </footer>
{% endif %}

{% if flash %}
    <div class="mt-3 alert alert-{{ flash.category }} text-start flash__alert">
        <ul>
            {% for message in flash.messages %}
                <li>{{ message }}</li>
            {% endfor %}
        </ul>
    </div>
{% endif %}

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Ищем контейнер flash-сообщений
        const flashContainers = document.querySelectorAll('.alert');

        flashContainers.forEach(function(container) {
            setTimeout(function() {
                // Плавное исчезновение
                container.style.transition = 'opacity 0.5s ease';
                container.style.opacity = '0';

                // Удаление после анимации
                setTimeout(function() {
                    const parentCol = container.closest('.col-12');
                    if (parentCol && parentCol.parentElement) {
                        parentCol.remove();
                    }
                }, 500);

            }, 3000);
        });
    });
</script>
