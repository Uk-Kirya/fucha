services:

  postgres:
    image: postgres:14
    container_name: fucha_postgres
    env_file:
      - .env
    volumes:
      - ./pg_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_EXTERNAL_PORT}:5432"
    restart: always

  redis:
    image: redis:7
    container_name: fucha_redis
    ports:
      - "${REDIS_EXTERNAL_PORT}:6379"
    restart: always

  fastapi:
    build: .
    container_name: fucha_fastapi
    volumes:
      - .:/app
      - ./storage:/app/storage
    env_file:
      - .env
    ports:
      - "${FASTAPI_EXTERNAL_PORT}:8000"
    depends_on:
      - redis
      - postgres
    restart: always